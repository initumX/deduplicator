name: Build Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: windows-x86_64
            ext: .exe
          - os: ubuntu-latest
            target: linux-x86_64
            ext: ''
          - os: macos-latest
            target: macos-x86_64
            ext: ''

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pyside6 send2trash xxhash pillow
          pip install -e .[gui]

      - name: Build GUI Executable
        run: |
          pyinstaller --clean --noconfirm onlyone-gui.spec
          mv dist/OnlyOne${{ matrix.ext }} dist/OnlyOne-${{ matrix.target }}${{ matrix.ext }}

      - name: Build CLI Executable
        run: |
          pyinstaller --clean --noconfirm onlyone-cli.spec
          mv dist/onlyone-cli${{ matrix.ext }} dist/onlyone-cli-${{ matrix.target }}${{ matrix.ext }}

      - name: Prepare Artifacts
        run: |
          mkdir release-artifacts
          cp dist/OnlyOne-${{ matrix.target }}${{ matrix.ext }} release-artifacts/
          cp dist/onlyone-cli-${{ matrix.target }}${{ matrix.ext }} release-artifacts/
          cp README.md LICENSE release-artifacts/ 2>/dev/null || true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: release-artifacts/*
          draft: false
          prerelease: false
          body: |
            ## OnlyOne Release
            Automated build for ${{ matrix.target }}
            
            ### Downloads
            - **GUI**: `OnlyOne-${{ matrix.target }}`
            - **CLI**: `onlyone-cli-${{ matrix.target }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}