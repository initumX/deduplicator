name: Build Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: windows-x86_64
            ext: .exe
          - os: ubuntu-latest
            target: linux-x86_64
            ext: ''
          - os: macos-latest
            target: macos-x86_64
            ext: ''

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y upx-ucl libxcb-cursor0 libxkbcommon-x11-0 libxcb-shape0 libxcb-keysyms1 libxcb-image0 libxcb-xkb1 libxcb-render-util0 libxcb-icccm4 libxcb-util1 libegl1 libopengl0

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pyside6 send2trash xxhash pillow
          pip install -e .[gui]

      - name: Build GUI Executable
        shell: bash
        run: |
          pyinstaller --clean --noconfirm onlyone-gui.spec
          mv "dist/OnlyOne${{ matrix.ext }}" "dist/OnlyOne-${{ matrix.target }}${{ matrix.ext }}"

      - name: Build CLI Executable
        shell: bash
        run: |
          pyinstaller --clean --noconfirm onlyone-cli.spec
          mv "dist/onlyone-cli${{ matrix.ext }}" "dist/onlyone-cli-${{ matrix.target }}${{ matrix.ext }}"

      - name: Prepare Artifacts
        shell: bash
        run: |
          mkdir -p release-artifacts
          cp "dist/OnlyOne-${{ matrix.target }}${{ matrix.ext }}" "release-artifacts/"
          cp "dist/onlyone-cli-${{ matrix.target }}${{ matrix.ext }}" "release-artifacts/"
          cp README.md LICENSE release-artifacts/ 2>/dev/null || true

      # --- ALWAYS RUNS: Uploads files to Actions tab (valid for 90 days) ---
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: release-artifacts/
          retention-days: 90

      # --- CONDITIONAL: Creates GitHub Release ---
      - name: Create Release
        uses: softprops/action-gh-release@v1
        # Creates release for Tags OR Manual Dispatch
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          files: release-artifacts/*
          draft: false
          # Mark manual runs as prerelease to distinguish from official versions
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          tag_name: "${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('dev-build-{0}', github.run_number) }}"
          name: "${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('Development Build #{0}', github.run_number) }}"
          body: |
            ## OnlyOne Build
            Target: ${{ matrix.target }}
            Trigger: ${{ github.event_name }}
            
            ### Downloads
            - **GUI**: `OnlyOne-${{ matrix.target }}`
            - **CLI**: `onlyone-cli-${{ matrix.target }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}